name: Vercel Production Deployment

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
    branches:
      - main

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: >
          vercel deploy --prebuilt --prod
          --token=${{ secrets.VERCEL_TOKEN }}
          --env MYSQL_HOST=${{ secrets.MYSQL_HOST }}
          --env MYSQL_PORT=${{ secrets.MYSQL_PORT }}
          --env MYSQL_USER=${{ secrets.MYSQL_USER }}
          --env MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          --env MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
